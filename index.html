
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ralex Perfumaria</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background: #070707;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen">

<header class="border-b border-white/10 p-4 sticky top-0 bg-black z-50">
  <div class="max-w-6xl mx-auto flex items-center justify-between">
    <h1 class="text-2xl font-bold tracking-[0.3em]">RALEX</h1>

    <div class="flex items-center gap-3">
      <button onclick="openAdmin()"
        class="border border-white/20 px-4 py-2 rounded text-sm hover:bg-white hover:text-black transition">
        Vendedor
      </button>

      <button onclick="toggleCart()" class="relative">
        🛍️
        <span id="cart-count"
          class="absolute -top-2 -right-2 bg-yellow-500 text-black text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
      </button>
    </div>
  </div>
</header>

<section class="max-w-6xl mx-auto p-4 mt-8">

  <div class="flex flex-col md:flex-row gap-4 justify-between mb-8">

    <input
      id="search"
      oninput="renderProducts()"
      type="text"
      placeholder="Buscar perfume..."
      class="bg-zinc-900 border border-white/10 rounded px-4 py-3 w-full md:w-80"
    />

    <button onclick="openProductModal()"
      id="admin-add-btn"
      class="hidden bg-yellow-500 text-black font-bold px-4 py-3 rounded">
      + Adicionar Perfume
    </button>
  </div>

  <div id="products-grid"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
  </div>
</section>

<!-- MODAL ADMIN -->
<div id="admin-modal"
  class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">

  <div class="bg-zinc-900 p-6 rounded-xl w-full max-w-sm">

    <h2 class="text-xl font-bold mb-4">Área do vendedor</h2>

    <form onsubmit="login(event)">
      <input
        id="admin-password"
        type="password"
        placeholder="Senha"
        class="w-full bg-black border border-white/10 rounded px-4 py-3 mb-4"
      />

      <div class="flex gap-2">
        <button type="button"
          onclick="closeAdmin()"
          class="w-1/2 border border-white/20 py-3 rounded">
          Cancelar
        </button>

        <button
          class="w-1/2 bg-yellow-500 text-black font-bold py-3 rounded">
          Entrar
        </button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div id="product-modal"
  class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 overflow-y-auto">

  <div class="bg-zinc-900 p-6 rounded-xl w-full max-w-md">

    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold">Perfume</h2>

      <button onclick="closeProductModal()">✖</button>
    </div>

    <form onsubmit="saveProduct(event)" class="space-y-4">

      <input type="hidden" id="product-id" />

      <input
        id="name"
        type="text"
        placeholder="Nome"
        required
        class="w-full bg-black border border-white/10 rounded px-4 py-3"
      />

      <input
        id="brand"
        type="text"
        placeholder="Marca"
        required
        class="w-full bg-black border border-white/10 rounded px-4 py-3"
      />

      <input
        id="price"
        type="number"
        placeholder="Preço"
        required
        class="w-full bg-black border border-white/10 rounded px-4 py-3"
      />

      <textarea
        id="desc"
        placeholder="Descrição"
        required
        class="w-full bg-black border border-white/10 rounded px-4 py-3 h-28"></textarea>

      <input
        id="image"
        type="file"
        accept="image/*"
        class="w-full"
      />

      <button
        class="w-full bg-yellow-500 text-black font-bold py-3 rounded">
        Salvar Produto
      </button>
    </form>
  </div>
</div>

<!-- CARRINHO -->
<div id="cart"
  class="hidden fixed top-0 right-0 w-full max-w-sm h-full bg-zinc-900 z-50 p-6 overflow-y-auto">

  <div class="flex justify-between items-center mb-6">
    <h2 class="text-xl font-bold">Carrinho</h2>

    <button onclick="toggleCart()">✖</button>
  </div>

  <div id="cart-items" class="space-y-4"></div>

  <button
    onclick="checkout()"
    class="mt-6 w-full bg-green-500 text-white font-bold py-3 rounded">
    Finalizar no WhatsApp
  </button>
</div>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  deleteDoc,
  doc,
  updateDoc
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js'

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js'

const firebaseConfig = {
  apiKey: 'AIzaSyA3P30QtgV-CxH7UA3U9M45eqIHSe61Prg',
  authDomain: 'ralex-perfumaria.firebaseapp.com',
  projectId: 'ralex-perfumaria',
  storageBucket: 'ralex-perfumaria.firebasestorage.app',
  messagingSenderId: '629346583696',
  appId: '1:629346583696:web:42a25a7d185c59cc900415'
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)
const storage = getStorage(app)

const productsRef = collection(db, 'products')

let products = []
let cart = JSON.parse(localStorage.getItem('cart')) || []
let admin = false

onSnapshot(productsRef, snapshot => {

  products = []

  snapshot.forEach(docItem => {
    products.push({
      id: docItem.id,
      ...docItem.data()
    })
  })

  renderProducts()
})

window.openAdmin = () => {
  document.getElementById('admin-modal').classList.remove('hidden')
}

window.closeAdmin = () => {
  document.getElementById('admin-modal').classList.add('hidden')
}

window.login = (event) => {

  event.preventDefault()

  const password = document.getElementById('admin-password').value

  if(password === 'Raquel2026') {

    admin = true

    document.getElementById('admin-add-btn').classList.remove('hidden')

    closeAdmin()

    alert('Acesso liberado')

  } else {
    alert('Senha incorreta')
  }
}

window.renderProducts = () => {

  const search = document.getElementById('search').value.toLowerCase()

  const grid = document.getElementById('products-grid')

  grid.innerHTML = ''

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(search) ||
    p.brand.toLowerCase().includes(search)
  )

  filtered.forEach(product => {

    grid.innerHTML += `

      <div class="bg-zinc-900 rounded-2xl overflow-hidden border border-white/10">

        <img
          src="${product.image}"
          class="w-full h-64 object-cover"
        />

        <div class="p-4">

          <h3 class="text-lg font-bold">${product.name}</h3>

          <p class="text-sm text-zinc-400">${product.brand}</p>

          <p class="text-yellow-500 font-bold mt-3">
            R$ ${product.price}
          </p>

          <p class="text-sm text-zinc-300 mt-3 line-clamp-3">
            ${product.desc}
          </p>

          <div class="flex gap-2 mt-5">

            <button
              onclick="addToCart('${product.id}')"
              class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl">
              Comprar
            </button>

            ${admin ? `
              <button
                onclick="removeProduct('${product.id}')"
                class="bg-red-500 px-4 rounded-xl">
                🗑️
              </button>
            ` : ''}

          </div>
        </div>
      </div>
    `
  })
}

window.openProductModal = () => {
  document.getElementById('product-modal').classList.remove('hidden')
}

window.closeProductModal = () => {
  document.getElementById('product-modal').classList.add('hidden')
}

window.saveProduct = async (event) => {

  event.preventDefault()

  const id = document.getElementById('product-id').value

  const name = document.getElementById('name').value
  const brand = document.getElementById('brand').value
  const price = document.getElementById('price').value
  const desc = document.getElementById('desc').value

  const imageFile = document.getElementById('image').files[0]

  let imageUrl = ''

  if(imageFile) {

    const imageRef = ref(storage, `perfumes/${Date.now()}-${imageFile.name}`)

    await uploadBytes(imageRef, imageFile)

    imageUrl = await getDownloadURL(imageRef)
  }

  const data = {
    name,
    brand,
    price,
    desc,
    image: imageUrl
  }

  if(id) {

    await updateDoc(doc(db, 'products', id), data)

  } else {

    await addDoc(productsRef, data)
  }

  closeProductModal()
}

window.removeProduct = async (id) => {

  const confirmDelete = confirm('Deseja remover?')

  if(!confirmDelete) return

  await deleteDoc(doc(db, 'products', id))
}

window.addToCart = (id) => {

  const product = products.find(p => p.id === id)

  const existing = cart.find(i => i.id === id)

  if(existing) {
    existing.quantity += 1
  } else {
    cart.push({ ...product, quantity: 1 })
  }

  localStorage.setItem('cart', JSON.stringify(cart))

  updateCart()
}

window.toggleCart = () => {

  document.getElementById('cart').classList.toggle('hidden')

  updateCart()
}

function updateCart() {

  document.getElementById('cart-count').innerText =
    cart.reduce((acc, item) => acc + item.quantity, 0)

  const container = document.getElementById('cart-items')

  container.innerHTML = ''

  cart.forEach(item => {

    container.innerHTML += `
      <div class="bg-black rounded-xl p-3 flex gap-3 items-center">

        <img
          src="${item.image}"
          class="w-16 h-16 rounded-xl object-cover"
        />

        <div>
          <h3 class="font-bold">${item.name}</h3>
          <p>${item.quantity}x</p>
        </div>
      </div>
    `
  })
}

window.checkout = () => {

  let message = '🛍️ *Pedido Ralex*%0A%0A'

  cart.forEach(item => {
    message += `• ${item.name} (${item.quantity}x)%0A`
  })

  window.open(
    `https://wa.me/5516997337321?text=${message}`,
    '_blank'
  )
}

lucide.createIcons()

</script>

</body>
</html>
```
